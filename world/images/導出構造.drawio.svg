<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="920" height="620" viewBox="-0.5 -0.5 920 620">
  <defs/>
  <g>
    <!-- Background -->
    <rect x="0" y="0" width="920" height="620" fill="#ffffff" stroke="none"/>

    <!-- Title -->
    <text x="460" y="30" fill="#333333" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">公理・定理の導出構造</text>

    <!-- Layer labels -->
    <text x="100" y="65" fill="#666666" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">基本法則（公理）</text>
    <text x="420" y="65" fill="#666666" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">導出法則（定理）</text>
    <text x="770" y="65" fill="#666666" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">応用</text>

    <!-- Vertical dividers -->
    <line x1="230" y1="50" x2="230" y2="600" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="630" y1="50" x2="630" y2="600" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- === Axiom nodes (blue) === -->
    <rect x="20" y="85" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="110" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A1] 現界と真界</text>

    <rect x="20" y="155" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="180" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A2] マナ</text>

    <rect x="20" y="295" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="320" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A3] 魂</text>

    <rect x="20" y="385" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="410" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A4] 精神エネルギー</text>

    <rect x="20" y="475" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="500" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A5] 共鳴</text>

    <!-- === Theorem nodes (green) === -->
    <rect x="290" y="85" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="110" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T1] エネルギー保存則</text>

    <rect x="290" y="165" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="190" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T2] 瘴気</text>

    <rect x="290" y="255" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="280" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T3] 存在強度</text>

    <rect x="290" y="345" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="370" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T4] マナ還元</text>

    <rect x="290" y="435" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="460" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T5] 魔法（現化・真化）</text>

    <rect x="290" y="505" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="530" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T6] 魔術</text>

    <rect x="290" y="565" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="590" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T7] 超能力</text>

    <!-- === Application nodes (orange) === -->
    <rect x="670" y="165" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="190" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">ダンジョン</text>

    <rect x="670" y="255" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="280" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">遺物・アーティファクト</text>

    <rect x="670" y="345" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="370" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">種族</text>

    <rect x="670" y="435" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="460" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">年表</text>

    <rect x="670" y="505" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="530" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">魔法・魔術の歴史</text>

    <!-- === Arrows: Axiom → Theorem === -->
    <!-- A1 → T1 -->
    <line x1="180" y1="105" x2="290" y2="105" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A2 → T1 -->
    <line x1="180" y1="175" x2="260" y2="115" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A2 → T2 -->
    <line x1="180" y1="175" x2="290" y2="185" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A4 → T3 -->
    <line x1="180" y1="400" x2="290" y2="275" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A5 → T3 -->
    <line x1="180" y1="490" x2="290" y2="280" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A3 → T5 -->
    <line x1="180" y1="315" x2="290" y2="445" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A4 → T5 -->
    <line x1="180" y1="405" x2="290" y2="450" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A5 → T5 -->
    <line x1="180" y1="495" x2="290" y2="455" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A4 → T7 -->
    <line x1="180" y1="415" x2="290" y2="580" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- === Arrows: Theorem → Theorem === -->
    <!-- T1 → T2 -->
    <line x1="390" y1="125" x2="390" y2="165" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T2 → T3 -->
    <line x1="390" y1="205" x2="390" y2="255" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T2 → T4 -->
    <line x1="420" y1="205" x2="420" y2="345" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T3 → T4 -->
    <line x1="390" y1="295" x2="390" y2="345" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T5 → T6 -->
    <line x1="390" y1="475" x2="390" y2="505" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- === Arrows: Theorem → Application === -->
    <!-- T2 → ダンジョン -->
    <line x1="490" y1="185" x2="670" y2="185" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T3 → 遺物 -->
    <line x1="490" y1="275" x2="670" y2="275" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T3 → ダンジョン -->
    <line x1="490" y1="265" x2="670" y2="195" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T4 → 遺物 -->
    <line x1="490" y1="360" x2="670" y2="280" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T5 → 歴史 -->
    <line x1="490" y1="455" x2="670" y2="520" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T6 → 歴史 -->
    <line x1="490" y1="525" x2="670" y2="525" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>

    <!-- Arrow markers -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
      </marker>
      <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
      </marker>
    </defs>

    <!-- Legend -->
    <rect x="20" y="555" width="16" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="42" y="568" fill="#333333" font-family="sans-serif" font-size="11">公理（基本法則）</text>
    <rect x="140" y="555" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="162" y="568" fill="#333333" font-family="sans-serif" font-size="11">定理（導出法則）</text>
    <rect x="260" y="555" width="16" height="16" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="282" y="568" fill="#333333" font-family="sans-serif" font-size="11">応用ドキュメント</text>
  </g>
</svg>
