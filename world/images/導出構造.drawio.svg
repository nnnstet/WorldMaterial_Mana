<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="920" height="680" viewBox="-0.5 -0.5 920 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
  </defs>
  <g>
    <!-- Background -->
    <rect x="0" y="0" width="920" height="680" fill="#ffffff" stroke="none"/>

    <!-- Title -->
    <text x="460" y="30" fill="#333333" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">公理・定理の導出構造</text>

    <!-- Layer labels -->
    <text x="100" y="65" fill="#666666" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">基本法則（公理）</text>
    <text x="420" y="65" fill="#666666" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">導出法則（定理）</text>
    <text x="770" y="65" fill="#666666" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">応用</text>

    <!-- Vertical dividers -->
    <line x1="230" y1="50" x2="230" y2="660" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="630" y1="50" x2="630" y2="660" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- === Axiom nodes (blue) — 6 nodes, y = 90, 170, 250, 330, 410, 490 === -->
    <rect x="20" y="90" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="115" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A1] 現界と真界</text>

    <rect x="20" y="170" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="195" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A2] マナ</text>

    <rect x="20" y="250" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="275" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A3] 個体</text>

    <rect x="20" y="330" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="355" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A4] 魂</text>

    <rect x="20" y="410" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="435" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A5] 精神エネルギー</text>

    <rect x="20" y="490" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="100" y="515" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[A6] マナの変換</text>

    <!-- === Theorem nodes (green) === -->
    <rect x="290" y="90" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="115" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T1] エネルギー保存則</text>

    <rect x="290" y="170" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="195" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T2] 瘴気</text>

    <rect x="290" y="270" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="295" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T3] 存在強度</text>

    <rect x="290" y="360" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="385" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T4] マナ還元</text>

    <rect x="290" y="450" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="475" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T5] 魔法（現化・真化）</text>

    <rect x="290" y="530" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="555" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T6] 魔術</text>

    <rect x="290" y="600" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="625" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">[T7] 超能力</text>

    <!-- === Application nodes (orange) === -->
    <rect x="670" y="170" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="195" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">ダンジョン</text>

    <rect x="670" y="270" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="295" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">遺物・アーティファクト</text>

    <rect x="670" y="360" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="385" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">種族</text>

    <rect x="670" y="450" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="475" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">年表</text>

    <rect x="670" y="530" width="200" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
    <text x="770" y="555" fill="#e65100" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">魔法・魔術の歴史</text>

    <!-- === Arrows: Axiom → Theorem === -->
    <!-- A1 → T1 -->
    <line x1="180" y1="110" x2="290" y2="110" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A2 → T1 -->
    <line x1="180" y1="190" x2="290" y2="118" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A6 → T1 -->
    <line x1="180" y1="510" x2="290" y2="125" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A6 → T2 -->
    <line x1="180" y1="505" x2="290" y2="190" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A5 → T3 -->
    <line x1="180" y1="425" x2="290" y2="285" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A6 → T3 -->
    <line x1="180" y1="500" x2="290" y2="290" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A4 → T5 -->
    <line x1="180" y1="350" x2="290" y2="460" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A5 → T5 -->
    <line x1="180" y1="430" x2="290" y2="465" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- A6 → T5 -->
    <line x1="180" y1="510" x2="290" y2="470" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A5 → T7 -->
    <line x1="180" y1="440" x2="290" y2="615" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- A3 → 種族 (dashed hint: 個体 supports 種族) -->
    <line x1="180" y1="270" x2="670" y2="375" stroke="#cccccc" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-light)"/>

    <!-- === Arrows: Theorem → Theorem === -->
    <!-- T1 → T2 -->
    <line x1="390" y1="130" x2="390" y2="170" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T2 → T3 -->
    <line x1="390" y1="210" x2="390" y2="270" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T2 → T4 -->
    <line x1="420" y1="210" x2="420" y2="360" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T3 → T4 -->
    <line x1="390" y1="310" x2="390" y2="360" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- T5 → T6 -->
    <line x1="390" y1="490" x2="390" y2="530" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- === Arrows: Theorem → Application === -->
    <!-- T2 → ダンジョン -->
    <line x1="490" y1="190" x2="670" y2="190" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T3 → 遺物 -->
    <line x1="490" y1="290" x2="670" y2="290" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T3 → ダンジョン -->
    <line x1="490" y1="280" x2="670" y2="200" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T4 → 遺物 -->
    <line x1="490" y1="375" x2="670" y2="295" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T5 → 歴史 -->
    <line x1="490" y1="475" x2="670" y2="545" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>
    <!-- T6 → 歴史 -->
    <line x1="490" y1="550" x2="670" y2="550" stroke="#cccccc" stroke-width="1" marker-end="url(#arrow-light)"/>

    <!-- Legend -->
    <rect x="20" y="615" width="16" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="42" y="628" fill="#333333" font-family="sans-serif" font-size="11">公理（基本法則）</text>
    <rect x="140" y="615" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="162" y="628" fill="#333333" font-family="sans-serif" font-size="11">定理（導出法則）</text>
    <rect x="20" y="640" width="16" height="16" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="42" y="653" fill="#333333" font-family="sans-serif" font-size="11">応用ドキュメント</text>
  </g>
</svg>
